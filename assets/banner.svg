<svg width="800" height="140" viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#79c0ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="140" rx="8" fill="url(#bg)"/>
  <rect x="0" y="132" width="800" height="8" rx="0" fill="url(#accent)" opacity="0.3"/>
  <text x="40" y="55" font-family="SF Mono, Menlo, Consolas, monospace" font-size="32" font-weight="bold" fill="#58a6ff">CWHELPER</text>
  <text x="40" y="85" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#8b949e">DCT terminal companion — Jira + NetBox + Grafana queue browser</text>
  <text x="40" y="115" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13" fill="#484f58">$ cwhelper DO-12345</text>
  <text x="210" y="115" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13" fill="#3fb950">   ticket context in seconds</text>
  <!-- Terminal dots -->
  <circle cx="730" cy="30" r="6" fill="#f85149" opacity="0.8"/>
  <circle cx="750" cy="30" r="6" fill="#d29922" opacity="0.8"/>
  <circle cx="770" cy="30" r="6" fill="#3fb950" opacity="0.8"/>
